basePath: /api
definitions:
  dto.APIResponse:
    properties:
      data: {}
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.BC11Request:
    properties:
      bc11_number:
        type: string
      manifest_id:
        type: string
    required:
    - bc11_number
    - manifest_id
    type: object
  dto.BC11Response:
    properties:
      bc11_number:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      manifest_id:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      role:
        type: string
      token:
        type: string
    type: object
  dto.ManifestDetailRequest:
    properties:
      container_no:
        type: string
      goods_description:
        type: string
      quantity:
        type: integer
    required:
    - container_no
    - goods_description
    - quantity
    type: object
  dto.ManifestDetailResponse:
    properties:
      container_no:
        type: string
      created_at:
        type: string
      goods_description:
        type: string
      id:
        type: string
      manifest_id:
        type: string
      quantity:
        type: integer
    type: object
  dto.ManifestRequest:
    properties:
      manifest_number:
        type: string
      shipping_agent_id:
        type: string
      vessel_id:
        type: string
    required:
    - manifest_number
    - shipping_agent_id
    - vessel_id
    type: object
  dto.ManifestResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      manifest_details:
        items:
          $ref: '#/definitions/dto.ManifestDetailResponse'
        type: array
      manifest_number:
        type: string
      shipping_agent:
        $ref: '#/definitions/dto.ShippingAgentResponse'
      shipping_agent_id:
        type: string
      status:
        type: string
      vessel:
        $ref: '#/definitions/dto.VesselResponse'
      vessel_id:
        type: string
    type: object
  dto.NPERequest:
    properties:
      bc11_id:
        type: string
      npe_number:
        type: string
    required:
    - bc11_id
    - npe_number
    type: object
  dto.NPEResponse:
    properties:
      bc11_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      npe_number:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      password:
        minLength: 6
        type: string
      role:
        enum:
        - Administrator
        - Petugas
        type: string
      username:
        type: string
    required:
    - password
    - role
    - username
    type: object
  dto.RegisterResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  dto.ShippingAgentRequest:
    properties:
      agent_code:
        type: string
      agent_name:
        type: string
    required:
    - agent_code
    - agent_name
    type: object
  dto.ShippingAgentResponse:
    properties:
      agent_code:
        type: string
      agent_name:
        type: string
      created_at:
        type: string
      id:
        type: string
    type: object
  dto.SummaryResponse:
    properties:
      total_bc11:
        type: integer
      total_manifests:
        type: integer
      total_npe:
        type: integer
      total_ready_xray:
        type: integer
    type: object
  dto.VesselRequest:
    properties:
      arrival_date:
        type: string
      departure_date:
        type: string
      vessel_code:
        type: string
      vessel_name:
        type: string
    required:
    - arrival_date
    - departure_date
    - vessel_code
    - vessel_name
    type: object
  dto.VesselResponse:
    properties:
      arrival_date:
        type: string
      created_at:
        type: string
      departure_date:
        type: string
      id:
        type: string
      vessel_code:
        type: string
      vessel_name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API untuk manajemen manifest kapal, BC11, dan NPE
  title: Manifest API
  version: "1.0"
paths:
  /bc11:
    post:
      consumes:
      - application/json
      parameters:
      - description: Data BC11
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BC11Request'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BC11Response'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Buat BC11 untuk manifest
      tags:
      - BC11
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Kredensial login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Login user
      tags:
      - Auth
  /manifests:
    get:
      parameters:
      - description: 'Halaman (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah per halaman (default: 10)'
        in: query
        name: limit
        type: integer
      - description: Cari berdasarkan nomor manifest
        in: query
        name: search
        type: string
      - description: Filter berdasarkan ID manifest (UUID)
        in: query
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ManifestResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: List manifest dengan pagination dan filter
      tags:
      - Manifest
    post:
      consumes:
      - application/json
      parameters:
      - description: Data manifest
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ManifestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ManifestResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Buat manifest baru
      tags:
      - Manifest
  /manifests/{id}:
    get:
      parameters:
      - description: Manifest ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ManifestResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail manifest by ID (include vessel, agent, containers, BC11)
      tags:
      - Manifest
  /manifests/{id}/details:
    post:
      consumes:
      - application/json
      parameters:
      - description: Manifest ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Data container
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ManifestDetailRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ManifestDetailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Tambah detail container ke manifest
      tags:
      - Manifest
  /npe:
    post:
      consumes:
      - application/json
      parameters:
      - description: Data NPE
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.NPERequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.NPEResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Buat NPE berdasarkan BC11
      tags:
      - NPE
  /register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Data registrasi
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RegisterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Registrasi user baru
      tags:
      - Auth
  /shipping-agents:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ShippingAgentResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: List semua shipping agent
      tags:
      - Shipping Agent
    post:
      consumes:
      - application/json
      parameters:
      - description: Data shipping agent
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ShippingAgentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ShippingAgentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Tambah shipping agent
      tags:
      - Shipping Agent
  /shipping-agents/{id}:
    get:
      parameters:
      - description: Shipping Agent ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ShippingAgentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail shipping agent by ID
      tags:
      - Shipping Agent
  /summary:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.SummaryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Ringkasan statistik data
      tags:
      - Summary
  /vessels:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.VesselResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: List semua vessel
      tags:
      - Vessel
    post:
      consumes:
      - application/json
      parameters:
      - description: Data vessel
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VesselRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.VesselResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Tambah vessel (kapal)
      tags:
      - Vessel
  /vessels/{id}:
    get:
      parameters:
      - description: Vessel ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.VesselResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail vessel by ID
      tags:
      - Vessel
securityDefinitions:
  BearerAuth:
    description: 'Masukkan token dengan format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
